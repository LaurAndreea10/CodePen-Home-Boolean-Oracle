<div class="app">
	<div class="bg-grid"></div>
	<div class="bg-scanlines"></div>
	<div class="bg-noise"></div>
	<div class="bg-vignette"></div>

	<main class="oracle" data-state="true">
		<div class="oracle-flash"></div>

		<div class="boot-sequence" aria-hidden="true">
			<div class="boot-panel">
				<p class="boot-line">BOOTING ORACLE CORE...</p>
				<p class="boot-line">CALIBRATING TRUTH MATRIX...</p>
				<p class="boot-line">CHECKING BOOLEAN STABILITY...</p>
				<p class="boot-line boot-status">STATUS: <span>INITIALIZING</span></p>
			</div>
		</div>

		<header class="hero">
			<p class="eyebrow">CODEPEN CHALLENGE // TRUE & FALSE</p>
			<h1 class="title">
				BOOLEAN ORACLE
				<span class="title-glitch" aria-hidden="true">BOOLEAN ORACLE</span>
			</h1>
			<p class="subtitle">
				Current verdict:
				<span class="state-text">TRUE</span>
			</p>
		</header>

		<section class="stage">
			<div class="reactor-wrap">
				<div class="reactor" aria-hidden="true">
					<div class="halo halo-1"></div>
					<div class="halo halo-2"></div>

					<div class="ring ring-a"></div>
					<div class="ring ring-b"></div>
					<div class="ring ring-c"></div>

					<div class="shockwave shockwave-1"></div>
					<div class="shockwave shockwave-2"></div>

					<div class="core-shadow"></div>
					<div class="core">
						<div class="core-inner"></div>
						<div class="core-symbol">T</div>
					</div>

					<div class="orbit orbit-1"></div>
					<div class="orbit orbit-2"></div>

					<div class="fragments">
						<span></span><span></span><span></span><span></span>
						<span></span><span></span><span></span><span></span>
					</div>

					<div class="particles">
						<i style="--i:1"></i><i style="--i:2"></i><i style="--i:3"></i><i style="--i:4"></i>
						<i style="--i:5"></i><i style="--i:6"></i><i style="--i:7"></i><i style="--i:8"></i>
						<i style="--i:9"></i><i style="--i:10"></i><i style="--i:11"></i><i style="--i:12"></i>
					</div>

					<div class="cracks" aria-hidden="true">
						<span class="crack c1"></span>
						<span class="crack c2"></span>
						<span class="crack c3"></span>
						<span class="crack c4"></span>
						<span class="crack c5"></span>
						<span class="crack c6"></span>
					</div>

					<div class="burst" aria-hidden="true"></div>
				</div>
			</div>

			<div class="hud">
				<div class="readout">
					<div class="card">
						<span class="label">Mode</span>
						<span class="value mode-value">TRUE</span>
					</div>

					<div class="card">
						<span class="label">Stability</span>
						<span class="value stability-value">100%</span>
					</div>

					<div class="card wide">
						<span class="label">Oracle Message</span>
						<span class="value message-value">REALITY VERIFIED</span>
					</div>
				</div>

				<div class="controls">
					<div class="target-picker">
						<button class="verdict-btn true-btn is-active" data-set="true" type="button">
							<span class="btn-kicker">01</span>
							<span class="btn-main">TRUE</span>
							<span class="btn-sub">ORDER / STABILITY</span>
						</button>

						<button class="verdict-btn false-btn" data-set="false" type="button">
							<span class="btn-kicker">02</span>
							<span class="btn-main">FALSE</span>
							<span class="btn-sub">GLITCH / CHAOS</span>
						</button>
					</div>

					<button class="run-verdict" type="button">
						<span class="run-top">Oracle Protocol</span>
						<span class="run-main">RUN VERDICT</span>
						<span class="run-bottom">PRESS TO EVALUATE</span>
					</button>
				</div>
			</div>
		</section>
	</main>
</div>
